<div class="login-container">
  <div class="login-card">
    <div class="logo-shield-container">
      <i class="fas fa-shield-alt logo-shield"></i>
    </div>
    
    <h2>Control de Acceso</h2>
    <p class="subtitle">Sistema de Gestión Penitenciaria</p>
    
    <div class="input-group">
      <label>Usuario o DNI</label>
      <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Ej: admin o 12345678Z" required>
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Ingrese su contraseña" required>
    </div>

    <button class="btn-primary" (click)="onLogin()">Entrar al Sistema →</button>
    
    <div class="registro-section">
  <p>¿Es su primera visita?</p>
  <a routerLink="/portal-visitante" class="btn-link" style="text-decoration: none; display: inline-block;">
    Solicite su acceso aquí
  </a>
</div>
    <button class="btn-secondary">¿Olvidó su contraseña?</button>
  </div>
</div>
