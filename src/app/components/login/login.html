<div class="login-container">
  <div class="login-card">
    <div class="logo-shield-container">
      <i class="fas fa-shield-alt logo-shield"></i>
    </div>
    
    <h2>Control de Acceso</h2>
    <p class="subtitle">Sistema de Gestión Penitenciaria</p>
    
    <div class="input-group">
      <label>Usuario</label>
      <input type="text" [(ngModel)]="usuario" name="usuario" placeholder="Ingrese su usuario" required>
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Ingrese su contraseña" required>
    </div>

    <span class="label-roles">Seleccione su Perfil</span>
    <div class="options-grid">
      <div class="option-card" [class.active]="rolSeleccionado==='Admin'" (click)="rolSeleccionado='Admin'">
        <i class="fas fa-user-cog"></i>
        <span>Admin</span>
      </div>
      <div class="option-card" [class.active]="rolSeleccionado==='Guardia'" (click)="rolSeleccionado='Guardia'">
        <i class="fas fa-user-shield"></i>
        <span>Guardia</span>
      </div>
      <div class="option-card" [class.active]="rolSeleccionado==='Visitante'" (click)="rolSeleccionado='Visitante'">
        <i class="fas fa-users"></i>
        <span>Visitante</span>
      </div>
    </div>

    <button class="btn-primary" (click)="onLogin()">Entrar al Sistema →</button>
    <button class="btn-secondary">¿Olvidó su contraseña?</button>
  </div>
</div>
